<script type="text/babel" data-presets="env,react">
  (function () {
    // Auth guard — token must exist, have correct format, and be < 8 hours old
    (function () {
      var token = localStorage.getItem('cb_token');
      var ts    = parseInt(localStorage.getItem('cb_auth_ts') || '0', 10);
      var EIGHT_HOURS = 8 * 60 * 60 * 1000;
      var valid = token &&
                  (token.startsWith('sb-') || token.startsWith('auth-')) &&
                  (Date.now() - ts < EIGHT_HOURS);
      if (!valid) {
        ['cb_token','cb_role','cb_auth_ts','cb_user_name','cb_user_email','cb_user_role'].forEach(function(k){ localStorage.removeItem(k); });
        window.location.href = 'Carebridge Login.html';
      }
    })();

    // Voice reminder — plays on first user interaction after login (every 4 hours)
    (function () {
      try {
        if (!("speechSynthesis" in window)) return;
        var FOUR_HOURS = 4 * 60 * 60 * 1000;
        var last = parseInt(localStorage.getItem("cb_salawat_ts") || "0", 10);
        if (Date.now() - last < FOUR_HOURS) return;
        var played = false;
        var speak = function () {
          if (played) return;
          played = true;
          document.removeEventListener("click", speak, true);
          document.removeEventListener("keydown", speak, true);
          var voices = window.speechSynthesis.getVoices() || [];
          var ar = voices.find(function (v) { return /ar/i.test(v.lang) && /microsoft/i.test(v.name); })
                || voices.find(function (v) { return /ar-SA/i.test(v.lang); })
                || voices.find(function (v) { return /^ar/i.test(v.lang); });
          var text = "صَلِّ عَلَى النَّبِيِّ";
          var u = new SpeechSynthesisUtterance(text);
          u.lang = "ar-SA";
          if (ar) u.voice = ar;
          u.rate = 0.72;
          u.pitch = 1.05;
          u.volume = 1;
          try { window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); } catch (e) {}
          localStorage.setItem("cb_salawat_ts", String(Date.now()));
        };
        // Wait for first user interaction (Chrome requires this for audio)
        document.addEventListener("click", speak, true);
        document.addEventListener("keydown", speak, true);
      } catch (e) {}
    })();

    // Remove splash once React mounts
    var started = Date.now();
    var hide = function () {
      var s = document.getElementById("cb-splash");
      if (s) { s.style.opacity = "0"; setTimeout(function () { s.remove(); }, 420); }
    };
    var tries = 0;
    var t = setInterval(function () {
      tries++;
      var mounted = document.querySelector(".cb-app");
      var elapsed = Date.now() - started;
      if ((mounted && elapsed > 1600) || tries > 60) { clearInterval(t); hide(); }
    }, 100);
  })();
</script>

<!-- Supabase: injected dynamically so it never delays DOMContentLoaded or Babel -->
<script>
(function() {
  function loadSupabase() {
    var cdn = document.createElement('script');
    cdn.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    cdn.onload = function() {
      var client = document.createElement('script');
      client.src = 'lib/supabase-client.js';
      document.head.appendChild(client);
    };
    document.head.appendChild(cdn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadSupabase);
  } else {
    loadSupabase();
  }
})();
</script>
