<script type="text/babel" data-presets="env,react">
  (function () {
    // Auth guard
    (function () {
      var token = localStorage.getItem('cb_token');
      if (!token) { window.location.href = 'Carebridge Login.html'; }
    })();

    // Voice reminder
    (function () {
      try {
        if (sessionStorage.getItem("cb_salawat_played") === "1") return;
        if (!("speechSynthesis" in window)) return;
        var text = "صَلِّ عَلَى النَّبِيّ";
        var speak = function () {
          var u = new SpeechSynthesisUtterance(text);
          u.lang = "ar-SA";
          var ar = (window.speechSynthesis.getVoices() || []).find(function (v) { return /^ar/i.test(v.lang); });
          if (ar) u.voice = ar;
          u.rate = 0.9;
          try { window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); } catch (e) {}
        };
        if ((window.speechSynthesis.getVoices() || []).length) speak();
        else window.speechSynthesis.onvoiceschanged = speak;
        sessionStorage.setItem("cb_salawat_played", "1");
      } catch (e) {}
    })();

    // Remove splash once React mounts
    var started = Date.now();
    var urlRole = new URLSearchParams(window.location.search).get("role");
    if (urlRole) {
      localStorage.setItem("cb_token", "auto-" + urlRole);
      localStorage.setItem("cb_role", urlRole);
    }
    var hide = function () {
      var s = document.getElementById("cb-splash");
      if (s) { s.style.opacity = "0"; setTimeout(function () { s.remove(); }, 420); }
    };
    var tries = 0;
    var t = setInterval(function () {
      tries++;
      var mounted = document.querySelector(".cb-app");
      var elapsed = Date.now() - started;
      if ((mounted && elapsed > 1600) || tries > 60) { clearInterval(t); hide(); }
    }, 100);
  })();
</script>

<!-- Supabase: injected dynamically so it never delays DOMContentLoaded or Babel -->
<script>
(function() {
  function loadSupabase() {
    var cdn = document.createElement('script');
    cdn.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    cdn.onload = function() {
      var client = document.createElement('script');
      client.src = 'lib/supabase-client.js';
      document.head.appendChild(client);
    };
    document.head.appendChild(cdn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadSupabase);
  } else {
    loadSupabase();
  }
})();
</script>
