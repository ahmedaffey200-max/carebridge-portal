<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
<title>Carebridge Patient Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B3A6B;
    --navy-light: #234b8a;
    --teal: #1CA89C;
    --teal-light: #22c4b7;
    --teal-pale: #e6f7f6;
    --bg: #f4f7fb;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text-sub: #4a5568;
    --text-faint: #718096;
    --danger: #e53e3e;
    --warn: #d69e2e;
    --ok: #38a169;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(27,58,107,0.08);
    --shadow-lg: 0 8px 32px rgba(27,58,107,0.14);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1923;
      --surface: #1a2535;
      --border: #2d3748;
      --text: #f0f4f8;
      --text-sub: #a0aec0;
      --text-faint: #718096;
      --teal-pale: rgba(28,168,156,0.1);
    }
  }
  html, body { min-height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* ---- Splash ---- */
  #pp-splash {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--navy); z-index: 9999; transition: opacity .4s ease;
  }
  #pp-splash .pp-splash-inner {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  #pp-splash .pp-logo-box {
    width: 100px; height: 100px; border-radius: 24px; background: white;
    display: grid; place-items: center; padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  #pp-splash .pp-logo-box img { width: 76px; height: auto; }
  #pp-splash .pp-splash-text { color: white; font-size: 22px; font-weight: 700; }
  #pp-splash .pp-spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--teal); border-radius: 50%;
    animation: ppspin 0.8s linear infinite;
  }
  @keyframes ppspin { to { transform: rotate(360deg); } }

  /* ---- Gate (no access) ---- */
  .pp-gate {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px 20px; text-align: center;
    background: linear-gradient(160deg, var(--navy) 0%, #1CA89C 100%);
  }
  .pp-gate-box { background: white; border-radius: var(--radius); padding: 40px 32px; max-width: 400px; width: 100%; box-shadow: var(--shadow-lg); }
  .pp-gate-logo { width: 80px; height: 80px; border-radius: 18px; background: var(--navy); display: grid; place-items: center; margin: 0 auto 20px; padding: 10px; }
  .pp-gate-logo img { width: 60px; height: auto; }
  .pp-gate-box h2 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .pp-gate-box p { font-size: 15px; color: #4a5568; line-height: 1.6; }
  .pp-gate-icon { font-size: 48px; margin-bottom: 12px; }

  /* ---- App shell ---- */
  .pp-app { min-height: 100vh; display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; }

  /* ---- Header ---- */
  .pp-header {
    background: linear-gradient(135deg, var(--navy) 0%, #223d72 100%);
    padding: 20px 20px 24px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(27,58,107,0.3);
  }
  .pp-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .pp-header-brand { display: flex; align-items: center; gap: 10px; }
  .pp-header-brand img { width: 40px; height: 40px; border-radius: 10px; background: white; padding: 4px; }
  .pp-header-brand-text { color: white; font-size: 16px; font-weight: 700; line-height: 1.2; }
  .pp-header-brand-text span { display: block; font-size: 11px; font-weight: 400; opacity: 0.7; }
  .pp-logout-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
    color: white; border-radius: 8px; padding: 8px 14px; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
  }
  .pp-logout-btn:hover { background: rgba(255,255,255,0.25); }
  .pp-header-patient { color: white; }
  .pp-header-patient-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .pp-header-patient-meta { font-size: 13px; opacity: 0.75; margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pp-loc-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(28,168,156,0.3); border: 1px solid rgba(28,168,156,0.5);
    color: #7eeee8; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500;
  }

  /* ---- Nav tabs ---- */
  .pp-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 109px; z-index: 99; }
  .pp-tab { flex: 1; padding: 14px 8px; font-size: 13px; font-weight: 500; color: var(--text-faint); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.2s, border-color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .pp-tab svg { width: 18px; height: 18px; }
  .pp-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

  /* ---- Content ---- */
  .pp-content { flex: 1; padding: 20px 16px 40px; display: flex; flex-direction: column; gap: 16px; }

  /* ---- Cards ---- */
  .pp-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .pp-card-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .pp-card-title { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .pp-card-title svg { width: 17px; height: 17px; color: var(--teal); }
  .pp-card-body { padding: 16px 18px; }

  /* ---- Info grid ---- */
  .pp-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .pp-info-item label { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 3px; }
  .pp-info-item .pp-info-val { font-size: 14px; color: var(--text); font-weight: 500; }

  /* ---- Status pills ---- */
  .pp-pill { display: inline-flex; align-items: center; gap: 4px; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
  .pp-pill--teal { background: var(--teal-pale); color: var(--teal); }
  .pp-pill--navy { background: rgba(27,58,107,0.1); color: var(--navy); }
  .pp-pill--warn { background: #fef3c7; color: #92400e; }
  .pp-pill--danger { background: #fee2e2; color: #991b1b; }
  .pp-pill--ok { background: #dcfce7; color: #166534; }
  .pp-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ---- Messages ---- */
  .pp-messages-list { display: flex; flex-direction: column; gap: 12px; max-height: 420px; overflow-y: auto; padding: 16px 18px; }
  .pp-msg { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
  .pp-msg--patient { align-self: flex-end; align-items: flex-end; }
  .pp-msg--coordinator { align-self: flex-start; align-items: flex-start; }
  .pp-msg-bubble {
    padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5;
  }
  .pp-msg--patient .pp-msg-bubble { background: var(--teal); color: white; border-bottom-right-radius: 4px; }
  .pp-msg--coordinator .pp-msg-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  .pp-msg-meta { font-size: 11px; color: var(--text-faint); padding: 0 4px; }
  .pp-msg-sender { font-size: 11px; font-weight: 600; color: var(--teal); margin-bottom: 2px; }
  .pp-no-messages { text-align: center; padding: 32px 16px; color: var(--text-faint); font-size: 14px; }
  .pp-msg-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }
  .pp-msg-input {
    flex: 1; border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px;
    font-size: 14px; background: var(--bg); color: var(--text); outline: none;
    resize: none; max-height: 120px; font-family: inherit;
    transition: border-color 0.2s;
  }
  .pp-msg-input:focus { border-color: var(--teal); }
  .pp-send-btn {
    width: 42px; height: 42px; border-radius: 50%; background: var(--teal); border: none;
    color: white; cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .pp-send-btn:hover { background: var(--teal-light); }
  .pp-send-btn:active { transform: scale(0.93); }
  .pp-send-btn svg { width: 18px; height: 18px; }
  .pp-send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* ---- Journey / appointments ---- */
  .pp-journey-list { display: flex; flex-direction: column; }
  .pp-journey-item { display: flex; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .pp-journey-item:last-child { border-bottom: none; }
  .pp-journey-dot-col { display: flex; flex-direction: column; align-items: center; padding-top: 3px; }
  .pp-journey-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
  .pp-journey-line { width: 2px; flex: 1; background: var(--border); margin: 4px 0; }
  .pp-journey-body { flex: 1; }
  .pp-journey-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .pp-journey-sub { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
  .pp-journey-date { font-size: 12px; font-weight: 600; color: var(--teal); margin-top: 4px; }

  /* ---- Coordinator card ---- */
  .pp-coord-row { display: flex; align-items: center; gap: 14px; padding: 16px 18px; }
  .pp-coord-av { width: 50px; height: 50px; border-radius: 50%; background: var(--navy); display: grid; place-items: center; color: white; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .pp-coord-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .pp-coord-sub { font-size: 13px; color: var(--text-faint); margin-top: 2px; }
  .pp-coord-actions { display: flex; gap: 8px; padding: 0 18px 16px; }
  .pp-coord-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text-sub); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .pp-coord-btn:hover { background: var(--teal-pale); color: var(--teal); border-color: var(--teal); }
  .pp-coord-btn svg { width: 16px; height: 16px; }

  /* ---- Spinner inline ---- */
  .pp-loading { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 12px; color: var(--text-faint); font-size: 14px; }
  .pp-spin { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: ppspin 0.8s linear infinite; }

  /* ---- Toast ---- */
  .pp-toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: calc(100% - 32px); max-width: 400px; }
  .pp-toast { background: #1a2535; color: white; border-radius: 10px; padding: 12px 16px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.3); animation: pptoastin 0.3s ease; }
  @keyframes pptoastin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- Responsive ---- */
  @media (min-width: 480px) {
    .pp-content { padding: 24px 20px 48px; }
    .pp-header { padding: 24px 24px 28px; }
    .pp-tabs { top: 120px; }
  }
</style>
</head>
<body>
<div id="pp-splash">
  <div class="pp-splash-inner">
    <div class="pp-logo-box"><img src="assets/carebridge-logo.png" alt="Carebridge" /></div>
    <div class="pp-splash-text">Carebridge Patient Portal</div>
    <div class="pp-spinner"></div>
  </div>
</div>
<div id="root"></div>
<div class="pp-toast-container" id="pp-toasts"></div>

<!-- React 18 + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ---- Supabase client ---- */
const SUPABASE_URL = "https://htvjjwfenvittdritjni.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0dmpqd2ZlbnZpdHRkcml0am5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ3OTAsImV4cCI6MjA5OTIzMDc5MH0.AMKUctPj49ahqXAFZbzJ341ZFH5XTckBUQaDmF5ZLj8";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---- Toast helper ---- */
function showToast(msg) {
  const c = document.getElementById("pp-toasts");
  if (!c) return;
  const d = document.createElement("div");
  d.className = "pp-toast";
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3200);
}

/* ---- SVG Icons (inline, no CDN) ---- */
const Icon = ({ name, size = 20 }) => {
  const paths = {
    user: <><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></>,
    "message-square": <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
    route: <><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></>,
    "log-out": <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    send: <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    "map-pin": <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>,
    "phone-call": <><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11.23 19.79 19.79 0 0 1 1.61 2.6 2 2 0 0 1 3.6.4h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>,
    mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,

    info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
    "alert-circle": <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
    "check-circle": <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {paths[name] || null}
    </svg>
  );
};

/* ---- Gate screen (no invitation) ---- */
function GateScreen({ message }) {
  return (
    <div className="pp-gate">
      <div className="pp-gate-box">
        <div className="pp-gate-logo">
          <img src="assets/carebridge-logo.png" alt="Carebridge International" />
        </div>
        <div className="pp-gate-icon">🔒</div>
        <h2>Access Required</h2>
        <p style={{ marginTop: 8 }}>{message || "You need an invitation link from Carebridge to access this portal."}</p>
        <p style={{ marginTop: 16, fontSize: 13, color: "#718096" }}>Please contact your Carebridge coordinator to receive your personal access link.</p>
      </div>
    </div>
  );
}

/* ---- My Information tab ---- */
function InfoTab({ invitation }) {
  const priority = invitation.priority || "Standard";
  const pillClass = priority === "Attention" ? "pp-pill--danger" : priority === "High" ? "pp-pill--warn" : "pp-pill--teal";
  const statusPill = invitation.status === "active" ? "pp-pill--ok" : "pp-pill--navy";

  return (
    <div className="pp-content">
      <div className="pp-card">
        <div className="pp-card-header">
          <div className="pp-card-title"><Icon name="user" /> My Information</div>
          <span className={"pp-pill " + statusPill}><span className="pp-pill-dot" />{invitation.status === "active" ? "Active" : "Pending"}</span>
        </div>
        <div className="pp-card-body">
          <div className="pp-info-grid">
            <div className="pp-info-item">
              <label>Full name</label>
              <div className="pp-info-val">{invitation.patient_name}</div>
            </div>
            <div className="pp-info-item">
              <label>Patient ID</label>
              <div className="pp-info-val" style={{ fontFamily: "monospace", fontSize: 13 }}>{invitation.patient_id}</div>
            </div>
            {invitation.specialty && (
              <div className="pp-info-item">
                <label>Specialty</label>
                <div className="pp-info-val">{invitation.specialty}</div>
              </div>
            )}
            {invitation.condition && (
              <div className="pp-info-item">
                <label>Condition</label>
                <div className="pp-info-val">{invitation.condition}</div>
              </div>
            )}
            {invitation.hospital && (
              <div className="pp-info-item">
                <label>Hospital</label>
                <div className="pp-info-val">{invitation.hospital}</div>
              </div>
            )}
            {invitation.country && (
              <div className="pp-info-item">
                <label>Destination</label>
                <div className="pp-info-val">{invitation.country}</div>
              </div>
            )}
            <div className="pp-info-item">
              <label>Priority</label>
              <div className="pp-info-val"><span className={"pp-pill " + pillClass}>{priority}</span></div>
            </div>
            <div className="pp-info-item">
              <label>Portal expires</label>
              <div className="pp-info-val" style={{ fontSize: 13 }}>
                {new Date(invitation.expires_at).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}
              </div>
            </div>
          </div>
        </div>
      </div>

      {invitation.coordinator_name && (
        <div className="pp-card">
          <div className="pp-card-header">
            <div className="pp-card-title"><Icon name="user" /> Your Coordinator</div>
          </div>
          <div className="pp-coord-row">
            <div className="pp-coord-av">{(invitation.coordinator_name || "?").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase()}</div>
            <div>
              <div className="pp-coord-name">{invitation.coordinator_name}</div>
              <div className="pp-coord-sub">Carebridge International</div>
            </div>
          </div>
          <div className="pp-coord-actions">
            <button className="pp-coord-btn" onClick={() => showToast("Opening conversation with your coordinator...")}>
              <Icon name="message-square" size={16} /> Message
            </button>
            <button className="pp-coord-btn" onClick={() => showToast("Contact your coordinator via your invitation email.")}>
              <Icon name="mail" size={16} /> Email
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- Messages tab ---- */
function MessagesTab({ invitation }) {
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [text, setText] = useState("");
  const [sending, setSending] = useState(false);
  const endRef = useRef(null);
  const pollRef = useRef(null);

  const loadMessages = useCallback(async () => {
    const { data, error } = await sb
      .from("patient_messages")
      .select("*")
      .eq("patient_id", invitation.patient_id)
      .order("created_at", { ascending: true });
    if (!error && data) {
      setMessages(data);
      // Mark unread coordinator messages as read
      const unread = data.filter(m => m.sender_role === "coordinator" && !m.read_at);
      if (unread.length) {
        await sb.from("patient_messages")
          .update({ read_at: new Date().toISOString() })
          .in("id", unread.map(m => m.id));
      }
    }
    setLoading(false);
  }, [invitation.patient_id]);

  useEffect(() => {
    loadMessages();
    pollRef.current = setInterval(loadMessages, 30000);
    return () => clearInterval(pollRef.current);
  }, [loadMessages]);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const send = async () => {
    const content = text.trim();
    if (!content || sending) return;
    setSending(true);
    setText("");
    const { error } = await sb.from("patient_messages").insert({
      invitation_id: invitation.id,
      patient_id: invitation.patient_id,
      sender_role: "patient",
      sender_name: invitation.patient_name,
      content,
    });
    if (error) {
      showToast("Failed to send message. Please try again.");
      setText(content);
    } else {
      await loadMessages();
    }
    setSending(false);
  };

  const fmtTime = (ts) => {
    const d = new Date(ts);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }) + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1 }}>
      <div className="pp-content" style={{ paddingBottom: 0, gap: 0 }}>
        <div className="pp-card">
          <div className="pp-card-header">
            <div className="pp-card-title"><Icon name="message-square" /> Messages with {invitation.coordinator_name || "your coordinator"}</div>
          </div>
          {loading ? (
            <div className="pp-loading"><div className="pp-spin" /> Loading messages…</div>
          ) : (
            <div className="pp-messages-list">
              {messages.length === 0 ? (
                <div className="pp-no-messages">
                  <Icon name="message-square" size={32} />
                  <p style={{ marginTop: 12 }}>No messages yet. Send a message to your coordinator below.</p>
                </div>
              ) : messages.map(m => (
                <div key={m.id} className={"pp-msg pp-msg--" + m.sender_role}>
                  {m.sender_role === "coordinator" && <div className="pp-msg-sender">{m.sender_name}</div>}
                  <div className="pp-msg-bubble">{m.content}</div>
                  <div className="pp-msg-meta">{fmtTime(m.created_at)}{m.sender_role === "patient" && m.read_at ? " · Read" : ""}</div>
                </div>
              ))}
              <div ref={endRef} />
            </div>
          )}
          <div className="pp-msg-input-row">
            <textarea
              className="pp-msg-input"
              rows={1}
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder="Type a message to your coordinator…"
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            />
            <button className="pp-send-btn" onClick={send} disabled={!text.trim() || sending} aria-label="Send message">
              <Icon name="send" size={17} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---- Journey tab ---- */
function JourneyTab({ invitation }) {
  const [appointments, setAppointments] = useState(null);

  useEffect(() => {
    (async () => {
      // Try fetching appointments from Supabase if available
      const { data } = await sb
        .from("appointments")
        .select("*")
        .eq("patient_id", invitation.patient_id)
        .order("date", { ascending: true })
        .limit(20);
      setAppointments(data || []);
    })();
  }, [invitation.patient_id]);

  const statusDot = (status) => {
    if (!status) return "pp-pill--navy";
    const s = status.toLowerCase();
    if (s.includes("complet") || s.includes("done")) return "pp-pill--ok";
    if (s.includes("cancel")) return "pp-pill--danger";
    if (s.includes("upcom") || s.includes("schedul")) return "pp-pill--teal";
    return "pp-pill--navy";
  };

  return (
    <div className="pp-content">
      <div className="pp-card">
        <div className="pp-card-header">
          <div className="pp-card-title"><Icon name="route" /> My Treatment Journey</div>
        </div>
        {appointments === null ? (
          <div className="pp-loading"><div className="pp-spin" /> Loading…</div>
        ) : appointments.length === 0 ? (
          <div className="pp-card-body">
            <div style={{ textAlign: "center", padding: "24px 0", color: "var(--text-faint)" }}>
              <Icon name="calendar" size={36} />
              <p style={{ marginTop: 12, fontSize: 14 }}>Your treatment journey details will appear here once your coordinator has set them up.</p>
            </div>
          </div>
        ) : (
          <div className="pp-journey-list">
            {appointments.map((appt, i) => (
              <div key={appt.id || i} className="pp-journey-item">
                <div className="pp-journey-dot-col">
                  <div className="pp-journey-dot" />
                  {i < appointments.length - 1 && <div className="pp-journey-line" />}
                </div>
                <div className="pp-journey-body">
                  <div className="pp-journey-title">{appt.title || appt.type || "Appointment"}</div>
                  {appt.hospital && <div className="pp-journey-sub">{appt.hospital}</div>}
                  {appt.notes && <div className="pp-journey-sub" style={{ marginTop: 4 }}>{appt.notes}</div>}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                    {appt.date && <span className="pp-journey-date"><Icon name="calendar" size={12} /> {new Date(appt.date).toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" })}</span>}
                    {appt.status && <span className={"pp-pill " + statusDot(appt.status)} style={{ fontSize: 11, padding: "2px 8px" }}>{appt.status}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="pp-card">
        <div className="pp-card-header">
          <div className="pp-card-title"><Icon name="info" /> What to expect</div>
        </div>
        <div className="pp-card-body">
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[
              { icon: "check-circle", text: "Your coordinator will update your journey as appointments are confirmed." },
              { icon: "calendar", text: "You will receive notification when new appointments are scheduled." },
              { icon: "hospital", text: "Hospital and travel details will be shared here and via your coordinator." },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ color: "var(--teal)", marginTop: 1, flexShrink: 0 }}><Icon name={item.icon} size={16} /></span>
                <span style={{ fontSize: 13, color: "var(--text-sub)", lineHeight: 1.5 }}>{item.text}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---- Location tracking ---- */
function useLocation(invitation) {
  const [locationLabel, setLocationLabel] = useState(null);
  const invRef = useRef(invitation);
  invRef.current = invitation;

  const saveLocation = useCallback(async (pos) => {
    const inv = invRef.current;
    if (!inv) return;
    const { latitude, longitude, accuracy } = pos.coords;
    let city = null, country = null;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`, {
        headers: { "Accept-Language": "en" }
      });
      const j = await r.json();
      city = j.address?.city || j.address?.town || j.address?.village || null;
      country = j.address?.country || null;
      if (city || country) setLocationLabel([city, country].filter(Boolean).join(", "));
    } catch (e) { /* ignore geocode errors */ }
    try {
      await sb.from("patient_locations").insert({
        invitation_id: inv.id,
        patient_id: inv.patient_id,
        latitude,
        longitude,
        accuracy,
        city,
        country,
      });
    } catch (e) { /* ignore */ }
  }, []);

  useEffect(() => {
    if (!invitation) return;
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(saveLocation, () => {});
    const interval = setInterval(() => {
      navigator.geolocation.getCurrentPosition(saveLocation, () => {});
    }, 10 * 60 * 1000);
    return () => clearInterval(interval);
  }, [invitation, saveLocation]);

  return locationLabel;
}

/* ---- Main App ---- */
function App() {
  const [loading, setLoading] = useState(true);
  const [invitation, setInvitation] = useState(null);
  const [error, setError] = useState(null);
  const [tab, setTab] = useState("info");
  const locationLabel = useLocation(invitation);

  useEffect(() => {
    (async () => {
      // 1. Get token from URL or localStorage
      let token = new URLSearchParams(window.location.search).get("token");
      if (!token) token = localStorage.getItem("cb_patient_token");
      if (!token) { setLoading(false); setError("no-token"); return; }

      // 2. Validate token
      const { data, error: err } = await sb
        .from("patient_invitations")
        .select("*")
        .eq("token", token)
        .single();

      if (err || !data) { setLoading(false); setError("invalid"); return; }
      if (data.status === "expired" || (data.expires_at && new Date(data.expires_at) < new Date())) {
        setLoading(false); setError("expired"); return;
      }

      // 3. Mark as active + used
      const updates = { status: "active" };
      if (!data.used_at) updates.used_at = new Date().toISOString();
      await sb.from("patient_invitations").update(updates).eq("token", token);

      // 4. Save token
      localStorage.setItem("cb_patient_token", token);

      // 5. Clean URL if token was in it
      if (new URLSearchParams(window.location.search).get("token")) {
        const url = new URL(window.location.href);
        url.searchParams.delete("token");
        window.history.replaceState({}, "", url.toString());
      }

      setInvitation({ ...data, ...updates });
      setLoading(false);
    })();
  }, []);

  // Remove splash
  useEffect(() => {
    if (!loading) {
      const s = document.getElementById("pp-splash");
      if (s) { s.style.opacity = "0"; setTimeout(() => s.remove(), 420); }
    }
  }, [loading]);

  const logout = () => {
    localStorage.removeItem("cb_patient_token");
    window.location.reload();
  };

  if (loading) return null;

  if (error === "no-token") return <GateScreen message="You need an invitation link from Carebridge to access this portal." />;
  if (error === "invalid") return <GateScreen message="This invitation link is invalid or has already been used from another device." />;
  if (error === "expired") return <GateScreen message="Your invitation link has expired. Please contact your Carebridge coordinator for a new link." />;
  if (!invitation) return <GateScreen />;

  return (
    <div className="pp-app">
      <div className="pp-header">
        <div className="pp-header-top">
          <div className="pp-header-brand">
            <img src="assets/carebridge-logo.png" alt="Carebridge" />
            <div className="pp-header-brand-text">
              Carebridge
              <span>International</span>
            </div>
          </div>
          <button className="pp-logout-btn" onClick={logout}>
            <Icon name="log-out" size={14} /> Sign out
          </button>
        </div>
        <div className="pp-header-patient">
          <div className="pp-header-patient-name">{invitation.patient_name}</div>
          <div className="pp-header-patient-meta">
            <span>{invitation.patient_id}</span>
            {invitation.coordinator_name && <span>· {invitation.coordinator_name}</span>}
            {locationLabel && (
              <span className="pp-loc-badge">
                <Icon name="map-pin" size={11} /> {locationLabel}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="pp-tabs">
        {[
          { id: "info", label: "My Info", icon: "user" },
          { id: "messages", label: "Messages", icon: "message-square" },
          { id: "journey", label: "Journey", icon: "route" },
        ].map(t => (
          <button key={t.id} className={"pp-tab" + (tab === t.id ? " active" : "")} onClick={() => setTab(t.id)}>
            <Icon name={t.icon} size={18} />
            {t.label}
          </button>
        ))}
      </div>

      {tab === "info" && <InfoTab invitation={invitation} />}
      {tab === "messages" && <MessagesTab invitation={invitation} />}
      {tab === "journey" && <JourneyTab invitation={invitation} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
