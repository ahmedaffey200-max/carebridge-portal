<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
<title>Carebridge Patient Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B3A6B;
    --navy-light: #234b8a;
    --teal: #1CA89C;
    --teal-light: #22c4b7;
    --teal-pale: #e6f7f6;
    --bg: #f4f7fb;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text-sub: #4a5568;
    --text-faint: #718096;
    --danger: #e53e3e;
    --warn: #d69e2e;
    --ok: #38a169;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(27,58,107,0.08);
    --shadow-lg: 0 8px 32px rgba(27,58,107,0.14);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1923;
      --surface: #1a2535;
      --border: #2d3748;
      --text: #f0f4f8;
      --text-sub: #a0aec0;
      --text-faint: #718096;
      --teal-pale: rgba(28,168,156,0.1);
    }
  }
  html, body { min-height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* ---- Splash ---- */
  #pp-splash {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--navy); z-index: 9999; transition: opacity .4s ease;
  }
  #pp-splash .pp-splash-inner { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  #pp-splash .pp-logo-box { width: 100px; height: 100px; border-radius: 24px; background: white; display: grid; place-items: center; padding: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  #pp-splash .pp-logo-box img { width: 76px; height: auto; }
  #pp-splash .pp-splash-text { color: white; font-size: 22px; font-weight: 700; }
  #pp-splash .pp-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: var(--teal); border-radius: 50%; animation: ppspin 0.8s linear infinite; }
  @keyframes ppspin { to { transform: rotate(360deg); } }

  /* ---- Auth screens ---- */
  .pp-auth-bg {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    background: linear-gradient(160deg, var(--navy) 0%, #1CA89C 100%);
  }
  .pp-auth-card {
    background: var(--surface); border-radius: 20px; padding: 36px 28px;
    width: 100%; max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  }
  @media (min-width: 480px) { .pp-auth-card { padding: 40px 36px; } }
  .pp-auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .pp-auth-logo-box { width: 42px; height: 42px; border-radius: 11px; background: var(--navy); display: grid; place-items: center; flex-shrink: 0; }
  .pp-auth-logo-box img { width: 30px; height: auto; }
  .pp-auth-logo-text { font-size: 17px; font-weight: 800; color: var(--navy); line-height: 1.2; }
  .pp-auth-logo-text span { color: var(--teal); }
  .pp-auth-logo-sub { font-size: 11px; font-weight: 500; color: var(--text-faint); }

  .pp-auth-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .pp-auth-sub { font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 24px; }

  .pp-field { margin-bottom: 16px; }
  .pp-field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .pp-input {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px; background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
  }
  .pp-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(28,168,156,0.12); }
  .pp-input[readonly] { background: var(--border); color: var(--text-faint); cursor: default; }
  .pp-input.pp-input--err { border-color: var(--danger); }

  .pp-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px;
    font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit;
  }
  .pp-btn--primary { background: linear-gradient(135deg, #1CA89C 0%, #1B3A6B 100%); color: white; }
  .pp-btn--ghost { background: transparent; color: var(--teal); border: 1.5px solid var(--border); }
  .pp-btn:hover:not(:disabled) { opacity: 0.88; }
  .pp-btn:active:not(:disabled) { transform: scale(0.98); }
  .pp-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .pp-btn--sm { padding: 10px 16px; font-size: 13px; width: auto; }

  /* Password requirements */
  .pp-pw-reqs { background: var(--bg); border-radius: 10px; padding: 12px 14px; margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .pp-pw-req { display: flex; align-items: center; gap: 9px; }
  .pp-pw-req-icon {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
    display: grid; place-items: center; flex-shrink: 0; transition: all 0.25s;
    font-size: 10px; font-weight: 800; color: transparent;
  }
  .pp-pw-req-icon.met { background: var(--ok); border-color: var(--ok); color: white; }
  .pp-pw-req-text { font-size: 13px; color: var(--text-faint); transition: color 0.25s; }
  .pp-pw-req-text.met { color: var(--ok); font-weight: 500; }

  .pp-auth-err { background: #fee2e2; color: #991b1b; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .pp-auth-ok { background: #dcfce7; color: #166534; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; text-align: center; }
  .pp-auth-link { background: none; border: none; color: var(--teal); font-size: 14px; cursor: pointer; padding: 0; font-family: inherit; text-decoration: underline; text-underline-offset: 2px; }
  .pp-auth-divider { text-align: center; margin: 18px 0; font-size: 13px; color: var(--text-faint); }
  .pp-pw-row { position: relative; }
  .pp-pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-faint); display: grid; place-items: center; padding: 4px; }

  /* ---- Gate screen ---- */
  .pp-gate {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px 20px; text-align: center;
    background: linear-gradient(160deg, var(--navy) 0%, #1CA89C 100%);
  }
  .pp-gate-box { background: var(--surface); border-radius: var(--radius); padding: 40px 32px; max-width: 400px; width: 100%; box-shadow: var(--shadow-lg); }
  .pp-gate-logo { width: 80px; height: 80px; border-radius: 18px; background: var(--navy); display: grid; place-items: center; margin: 0 auto 20px; padding: 10px; }
  .pp-gate-logo img { width: 60px; height: auto; }
  .pp-gate-box h2 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .pp-gate-box p { font-size: 15px; color: #4a5568; line-height: 1.6; }
  .pp-gate-icon { font-size: 48px; margin-bottom: 12px; }

  /* ---- App shell ---- */
  .pp-app { min-height: 100vh; display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; }

  /* ---- Header ---- */
  .pp-header {
    background: linear-gradient(135deg, var(--navy) 0%, #223d72 100%);
    padding: 20px 20px 24px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(27,58,107,0.3);
  }
  .pp-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .pp-header-brand { display: flex; align-items: center; gap: 10px; }
  .pp-header-brand img { width: 40px; height: 40px; border-radius: 10px; background: white; padding: 4px; }
  .pp-header-brand-text { color: white; font-size: 16px; font-weight: 700; line-height: 1.2; }
  .pp-header-brand-text span { display: block; font-size: 11px; font-weight: 400; opacity: 0.7; }
  .pp-logout-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .pp-logout-btn:hover { background: rgba(255,255,255,0.25); }
  .pp-header-patient { color: white; }
  .pp-header-patient-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .pp-header-patient-meta { font-size: 13px; opacity: 0.75; margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pp-loc-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(28,168,156,0.3); border: 1px solid rgba(28,168,156,0.5); color: #7eeee8; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500; }

  /* ---- Nav tabs ---- */
  .pp-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 109px; z-index: 99; }
  .pp-tab { flex: 1; padding: 14px 8px; font-size: 13px; font-weight: 500; color: var(--text-faint); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.2s, border-color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .pp-tab svg { width: 18px; height: 18px; }
  .pp-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

  /* ---- Content ---- */
  .pp-content { flex: 1; padding: 20px 16px 40px; display: flex; flex-direction: column; gap: 16px; }

  /* ---- Cards ---- */
  .pp-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .pp-card-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .pp-card-title { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .pp-card-title svg { width: 17px; height: 17px; color: var(--teal); }
  .pp-card-body { padding: 16px 18px; }

  /* ---- Info grid ---- */
  .pp-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .pp-info-item label { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 3px; }
  .pp-info-item .pp-info-val { font-size: 14px; color: var(--text); font-weight: 500; }

  /* ---- Status pills ---- */
  .pp-pill { display: inline-flex; align-items: center; gap: 4px; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
  .pp-pill--teal { background: var(--teal-pale); color: var(--teal); }
  .pp-pill--navy { background: rgba(27,58,107,0.1); color: var(--navy); }
  .pp-pill--warn { background: #fef3c7; color: #92400e; }
  .pp-pill--danger { background: #fee2e2; color: #991b1b; }
  .pp-pill--ok { background: #dcfce7; color: #166534; }
  .pp-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ---- Messages ---- */
  .pp-messages-list { display: flex; flex-direction: column; gap: 12px; max-height: 420px; overflow-y: auto; padding: 16px 18px; }
  .pp-msg { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
  .pp-msg--patient { align-self: flex-end; align-items: flex-end; }
  .pp-msg--coordinator { align-self: flex-start; align-items: flex-start; }
  .pp-msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
  .pp-msg--patient .pp-msg-bubble { background: var(--teal); color: white; border-bottom-right-radius: 4px; }
  .pp-msg--coordinator .pp-msg-bubble { background: #e8edf5; border: 1px solid var(--border); color: #1a202c; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  @media (prefers-color-scheme: dark) {
    .pp-msg--coordinator .pp-msg-bubble { background: #2a3f5f; border-color: #3d5a82; color: #f0f4f8; }
  }
  .pp-msg-meta { font-size: 11px; color: var(--text-faint); padding: 0 4px; }
  .pp-msg-sender { font-size: 11px; font-weight: 600; color: var(--teal); margin-bottom: 2px; }
  .pp-no-messages { text-align: center; padding: 32px 16px; color: var(--text-faint); font-size: 14px; }
  .pp-msg-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }
  .pp-msg-input { flex: 1; border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; font-size: 14px; background: var(--bg); color: var(--text); outline: none; resize: none; max-height: 120px; font-family: inherit; transition: border-color 0.2s; }
  .pp-msg-input:focus { border-color: var(--teal); }
  .pp-send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--teal); border: none; color: white; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
  .pp-send-btn:hover { background: var(--teal-light); }
  .pp-send-btn:active { transform: scale(0.93); }
  .pp-send-btn svg { width: 18px; height: 18px; }
  .pp-send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* ---- Journey ---- */
  .pp-journey-list { display: flex; flex-direction: column; }
  .pp-journey-item { display: flex; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .pp-journey-item:last-child { border-bottom: none; }
  .pp-journey-dot-col { display: flex; flex-direction: column; align-items: center; padding-top: 3px; }
  .pp-journey-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
  .pp-journey-line { width: 2px; flex: 1; background: var(--border); margin: 4px 0; }
  .pp-journey-body { flex: 1; }
  .pp-journey-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .pp-journey-sub { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
  .pp-journey-date { font-size: 12px; font-weight: 600; color: var(--teal); margin-top: 4px; }

  /* ---- Coordinator card ---- */
  .pp-coord-row { display: flex; align-items: center; gap: 14px; padding: 16px 18px; }
  .pp-coord-av { width: 50px; height: 50px; border-radius: 50%; background: var(--navy); display: grid; place-items: center; color: white; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .pp-coord-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .pp-coord-sub { font-size: 13px; color: var(--text-faint); margin-top: 2px; }
  .pp-coord-actions { display: flex; gap: 8px; padding: 0 18px 16px; }
  .pp-coord-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text-sub); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .pp-coord-btn:hover { background: var(--teal-pale); color: var(--teal); border-color: var(--teal); }
  .pp-coord-btn svg { width: 16px; height: 16px; }

  /* ---- Spinner ---- */
  .pp-loading { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 12px; color: var(--text-faint); font-size: 14px; }
  .pp-spin { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: ppspin 0.8s linear infinite; }

  /* ---- Toast ---- */
  .pp-toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: calc(100% - 32px); max-width: 400px; }
  .pp-toast { background: #1a2535; color: white; border-radius: 10px; padding: 12px 16px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.3); animation: pptoastin 0.3s ease; }
  @keyframes pptoastin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- Responsive ---- */
  @media (min-width: 480px) {
    .pp-content { padding: 24px 20px 48px; }
    .pp-header { padding: 24px 24px 28px; }
    .pp-tabs { top: 120px; }
  }
</style>
</head>

/* ---- Toast ---- */
function showToast(msg) {
  const c = document.getElementById("pp-toasts");
  if (!c) return;
  const d = document.createElement("div");
  d.className = "pp-toast";
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3400);

/* ---- Password validator ---- */
function validatePassword(pw) {
  const nums = (pw.match(/\d/g) || []).length;
  const hasMinNumbers = nums >= 4;
  const hasUppercase  = /[A-Z]/.test(pw);
  const hasLowercase  = /[a-z]/.test(pw);
  return { hasMinNumbers, hasUppercase, hasLowercase, valid: hasMinNumbers && hasUppercase && hasLowercase };
}

    lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
    eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    "eye-off": <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>,
    "arrow-left": <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {paths[name] || null}
    </svg>
  );
};

/* ================================================================
   Screen 1: Create Account (first visit via invite link)
   ================================================================ */
function CreateAccountScreen({ invitation, onSubmit }) {
  const [pw, setPw]         = useState("");
  const [pw2, setPw2]       = useState("");
  const [busy, setBusy]     = useState(false);
  const [err, setErr]       = useState("");
  const v = validatePassword(pw);
  const match = pw === pw2 && pw.length > 0;
  const canSubmit = v.valid && match && !busy;

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setBusy(true);
    setErr("");
    const result = await onSubmit(pw);
    if (result?.error) {
      setErr(result.error);
      setBusy(false);
    }
  };

  return (
    <div className="pp-auth-bg">
      <div className="pp-auth-card">
        <AuthLogo />
        <div className="pp-auth-title">Create your account</div>
        <div className="pp-auth-sub">
          Welcome, <strong>{invitation.patient_name}</strong>! Set a password to access your personal Carebridge portal.
        </div>

        {err && <div className="pp-auth-err">{err}</div>}

        <form onSubmit={submit}>
          <div className="pp-field">
            <label>Email address</label>
            <input
              className="pp-input"
              type="email"
              value={invitation.patient_email}
              readOnly
            />
          </div>

          <div className="pp-field">
            <label htmlFor="pw">Create password</label>
            <PwInput id="pw" value={pw} onChange={e => setPw(e.target.value)} placeholder="Choose a strong password" disabled={busy} />
            <div className="pp-pw-reqs">
              <PwReq met={v.hasMinNumbers}>At least 4 numbers (0–9)</PwReq>
              <PwReq met={v.hasUppercase}>At least 1 uppercase letter (A–Z)</PwReq>
              <PwReq met={v.hasLowercase}>At least 1 lowercase letter (a–z)</PwReq>
            </div>
          </div>

          <div className="pp-field" style={{ marginBottom: 24 }}>
            <label htmlFor="pw2">Confirm password</label>
            <PwInput id="pw2" value={pw2} onChange={e => setPw2(e.target.value)} placeholder="Repeat your password" disabled={busy} />
            {pw2.length > 0 && !match && (
              <div style={{ fontSize: 12, color: "var(--danger)", marginTop: 6 }}>Passwords do not match</div>
            )}
            {pw2.length > 0 && match && (
              <div style={{ fontSize: 12, color: "var(--ok)", marginTop: 6, display: "flex", alignItems: "center", gap: 4 }}>
                <Icon name="check-circle" size={13} /> Passwords match

          <button type="submit" className="pp-btn pp-btn--primary" disabled={!canSubmit}>
            {busy ? <><div className="pp-spin" style={{ width: 18, height: 18, borderWidth: 2 }} /> Creating account…</> : <><Icon name="lock" size={16} /> Create My Account</>}
          </button>
        </form>

        <div className="pp-auth-divider">
          This portal is only accessible by invitation. Your invitation expires in 30 days.
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   Screen 2: Login (returning patients)
   ================================================================ */
function LoginScreen({ onLogin, onForgotSuccess }) {
  const [view, setView]   = useState("login"); // "login" | "forgot" | "forgot-sent"
  const [email, setEmail] = useState("");
  const [pw, setPw]       = useState("");
  const [busy, setBusy]   = useState(false);
  const [err, setErr]     = useState("");

  const handleLogin = async (e) => {
    e.preventDefault();
    if (!email.trim() || !pw || busy) return;
    setBusy(true);
    setErr("");
    const result = await onLogin(email.trim(), pw);
    if (result?.error) {
      setErr(result.error);
      setBusy(false);
    }
  };

  const handleForgot = async (e) => {
    e.preventDefault();
    if (!email.trim() || busy) return;
    setBusy(true);
    setErr("");
    const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
      redirectTo: RESET_REDIRECT,
    });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setView("forgot-sent");
  };

  return (
    <div className="pp-auth-bg">
      <div className="pp-auth-card">
        <AuthLogo />

        {view === "login" && (
          <>
            <div className="pp-auth-title">Patient Portal</div>
            <div className="pp-auth-sub">Sign in to access your medical information and messages.</div>

            {err && <div className="pp-auth-err">{err}</div>}

            <form onSubmit={handleLogin}>
              <div className="pp-field">
                <label htmlFor="lemail">Email address</label>
                <input id="lemail" className="pp-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" disabled={busy} autoComplete="email" />
              </div>
              <div className="pp-field" style={{ marginBottom: 8 }}>
                <label htmlFor="lpw">Password</label>
                <PwInput id="lpw" value={pw} onChange={e => setPw(e.target.value)} disabled={busy} />
              </div>
              <div style={{ textAlign: "right", marginBottom: 20 }}>
                <button type="button" className="pp-auth-link" onClick={() => { setView("forgot"); setErr(""); }}>
                  Forgot password?
                </button>
              </div>
              <button type="submit" className="pp-btn pp-btn--primary" disabled={!email.trim() || !pw || busy}>
                {busy ? <><div className="pp-spin" style={{ width: 18, height: 18, borderWidth: 2 }} /> Signing in…</> : "Sign In"}
              </button>
            </form>

            <div className="pp-auth-divider" style={{ marginTop: 24 }}>
              This portal is only accessible via an invitation from your Carebridge coordinator.
            </div>
          </>
        )}

        {view === "forgot" && (
          <>
            <button type="button" onClick={() => { setView("login"); setErr(""); }} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-faint)", display: "flex", alignItems: "center", gap: 6, fontSize: 13, marginBottom: 20, padding: 0 }}>
              <Icon name="arrow-left" size={14} /> Back to sign in
            </button>
            <div className="pp-auth-title">Reset password</div>
            <div className="pp-auth-sub">Enter your email address and we'll send you a link to set a new password.</div>

            {err && <div className="pp-auth-err">{err}</div>}

            <form onSubmit={handleForgot}>
              <div className="pp-field" style={{ marginBottom: 20 }}>
                <label htmlFor="femail">Email address</label>
                <input id="femail" className="pp-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" disabled={busy} autoComplete="email" />
              </div>
              <button type="submit" className="pp-btn pp-btn--primary" disabled={!email.trim() || busy}>
                {busy ? <><div className="pp-spin" style={{ width: 18, height: 18, borderWidth: 2 }} /> Sending…</> : <><Icon name="mail" size={16} /> Send Reset Link</>}
              </button>
            </form>
          </>
        )}

        {view === "forgot-sent" && (
          <>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ width: 60, height: 60, borderRadius: "50%", background: "var(--teal-pale)", display: "grid", placeItems: "center", margin: "0 auto 16px", color: "var(--teal)" }}>
                <Icon name="mail" size={28} />
              </div>
              <div className="pp-auth-title" style={{ textAlign: "center" }}>Check your email</div>
            </div>
            <div className="pp-auth-ok">
              We sent a password reset link to <strong>{email}</strong>. Click the link in that email to set a new password.
            </div>
            <p style={{ fontSize: 13, color: "var(--text-faint)", textAlign: "center", lineHeight: 1.6, marginBottom: 20 }}>
              If you don't see it, check your spam folder. The link expires in 1 hour.
            </p>
            <button type="button" className="pp-btn pp-btn--ghost" onClick={() => { setView("login"); setErr(""); }}>
              Back to sign in
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function MessagesTab({ invitation }) {
  const [messages, setMessages] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [text, setText]         = useState("");
  const [sending, setSending]   = useState(false);
  const endRef  = useRef(null);
  const pollRef = useRef(null);

  const loadMessages = useCallback(async () => {
    const { data, error } = await sb.from("patient_messages").select("*").eq("patient_id", invitation.patient_id).order("created_at", { ascending: true });
    if (!error && data) {
      setMessages(data);
      const unread = data.filter(m => m.sender_role === "coordinator" && !m.read_at);
      if (unread.length) await sb.from("patient_messages").update({ read_at: new Date().toISOString() }).in("id", unread.map(m => m.id));
    }
    setLoading(false);
  }, [invitation.patient_id]);

  useEffect(() => { loadMessages(); pollRef.current = setInterval(loadMessages, 30000); return () => clearInterval(pollRef.current); }, [loadMessages]);
  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = async () => {
    const content = text.trim();
    if (!content || sending) return;
    setSending(true); setText("");
    const { error } = await sb.from("patient_messages").insert({ invitation_id: invitation.id, patient_id: invitation.patient_id, sender_role: "patient", sender_name: invitation.patient_name, content });
    if (error) { showToast("Failed to send. Please try again."); setText(content); }
    else await loadMessages();
    setSending(false);
  };

  const fmtTime = (ts) => {
    const d = new Date(ts), now = new Date();
    const today = d.toDateString() === now.toDateString();
    if (today) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }) + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1 }}>
      <div className="pp-content" style={{ paddingBottom: 0, gap: 0 }}>
        <div className="pp-card">
          <div className="pp-card-header"><div className="pp-card-title"><Icon name="message-square" /> Messages with {invitation.coordinator_name || "your coordinator"}</div></div>
          {loading ? <div className="pp-loading"><div className="pp-spin" /> Loading messages…</div> : (
            <div className="pp-messages-list">
              {messages.length === 0 ? (
                <div className="pp-no-messages"><Icon name="message-square" size={32} /><p style={{ marginTop: 12 }}>No messages yet. Send a message to your coordinator below.</p></div>
              ) : messages.map(m => (
                <div key={m.id} className={"pp-msg pp-msg--" + m.sender_role}>
                  {m.sender_role === "coordinator" && <div className="pp-msg-sender">{m.sender_name}</div>}
                  <div className="pp-msg-bubble">{m.content}</div>
                  <div className="pp-msg-meta">{fmtTime(m.created_at)}{m.sender_role === "patient" && m.read_at ? " · Read" : ""}</div>
                </div>
              ))}
              <div ref={endRef} />
            </div>
          )}
          <div className="pp-msg-input-row">
            <textarea className="pp-msg-input" rows={1} value={text} onChange={e => setText(e.target.value)} placeholder="Type a message to your coordinator…" onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} />
            <button className="pp-send-btn" onClick={send} disabled={!text.trim() || sending} aria-label="Send message"><Icon name="send" size={17} /></button>
          </div>
        </div>
      </div>
    </div>
  );
}

function JourneyTab({ invitation }) {
  const [activities, setActivities] = useState(null);
  const [refreshing, setRefreshing] = useState(false);

  const load = useCallback(async () => {
    const { data } = await sb
      .from("patient_activities")
      .select("*")
      .eq("patient_id", invitation.patient_id)
      .order("created_at", { ascending: false })
      .limit(50);
    setActivities(data || []);
  }, [invitation.patient_id]);

  useEffect(() => { load(); }, [load]);

  const refresh = async () => {
    setRefreshing(true);
    await load();
    setRefreshing(false);
  };

  const fmtTime = (ts) => {
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr  = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHr / 24);
    if (diffMin < 1)  return "Just now";
    if (diffMin < 60) return diffMin + "m ago";
    if (diffHr  < 24) return diffHr  + "h ago";
    if (diffDay < 7)  return diffDay + "d ago";
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  };

  const typeConfig = {
    stage_change:       { icon: "route",          color: "#1CA89C", label: "Stage Update"      },
    appointment_booked: { icon: "calendar-check",  color: "#2C5089", label: "Appointment"       },
    appointment_updated:{ icon: "calendar",        color: "#4A6FA5", label: "Appt. Updated"     },
    specialty_change:   { icon: "stethoscope",     color: "#C8862B", label: "Specialty"         },
    priority_change:    { icon: "alert-circle",    color: "#B4453C", label: "Priority"          },
    condition_update:   { icon: "clipboard",       color: "#6B7280", label: "Condition"         },
    destination_change: { icon: "map-pin",         color: "#7C3AED", label: "Destination"       },
    document_status:    { icon: "file-check-2",    color: "#0369A1", label: "Document"          },
    visa_status:        { icon: "stamp",           color: "#B45309", label: "Visa"              },
  };

  return (
    <div className="pp-content">
      <div className="pp-card">
        <div className="pp-card-header" style={{ justifyContent: "space-between" }}>
          <div className="pp-card-title"><Icon name="route" /> My Treatment Journey</div>
          <button onClick={refresh} disabled={refreshing}
            style={{ background: "var(--teal-pale)", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, color: "var(--teal)", cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
            <Icon name="refresh-cw" size={13} style={refreshing ? { animation: "ppspin 0.8s linear infinite" } : {}} />
            {refreshing ? "Refreshing…" : "Refresh"}
          </button>
        </div>

        {activities === null ? (
          <div className="pp-loading"><div className="pp-spin" /> Loading your journey…</div>
        ) : activities.length === 0 ? (
          <div className="pp-card-body">
            <div style={{ textAlign: "center", padding: "32px 0", color: "var(--text-faint)" }}>
              <Icon name="route" size={40} />
              <p style={{ marginTop: 14, fontSize: 14, lineHeight: 1.6 }}>
                Your treatment journey updates will appear here as your coordinator makes progress on your case.
              </p>
            </div>
          </div>
        ) : (
          <div style={{ padding: "8px 0" }}>
            {activities.map((act, i) => {
              const cfg = typeConfig[act.activity_type] || { icon: "circle", color: "#9CA3AF", label: "Update" };
              return (
                <div key={act.id} style={{ display: "flex", gap: 0, padding: "0 20px" }}>
                  {/* Timeline line + dot */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 36, flexShrink: 0 }}>
                    <div style={{ width: 32, height: 32, borderRadius: "50%", background: cfg.color + "18", border: "2px solid " + cfg.color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: cfg.color, marginTop: 14 }}>
                      <Icon name={cfg.icon} size={14} />
                    </div>
                    {i < activities.length - 1 && (
                      <div style={{ width: 2, flex: 1, minHeight: 16, background: "var(--border)", margin: "4px 0" }} />
                    )}
                  </div>
                  {/* Content */}
                  <div style={{ flex: 1, padding: "14px 0 14px 14px", borderBottom: i < activities.length - 1 ? "none" : "none" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                          <span style={{ background: cfg.color + "18", color: cfg.color, fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20, textTransform: "uppercase", letterSpacing: "0.05em" }}>{cfg.label}</span>
                        </div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", lineHeight: 1.4 }}>{act.title}</div>
                        {act.description && (
                          <div style={{ fontSize: 12.5, color: "var(--text-sub)", marginTop: 4, lineHeight: 1.5 }}>{act.description}</div>
                        )}
                        {act.old_value && act.new_value && act.old_value !== act.new_value && (
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 5, fontSize: 11.5 }}>
                            <span style={{ color: "var(--text-faint)", textDecoration: "line-through" }}>{act.old_value}</span>
                            <Icon name="arrow-right" size={11} style={{ color: "var(--text-faint)" }} />
                            <span style={{ color: cfg.color, fontWeight: 600 }}>{act.new_value}</span>
                          </div>
                        )}
                      </div>
                      <div style={{ fontSize: 11.5, color: "var(--text-faint)", whiteSpace: "nowrap", marginTop: 2 }}>{fmtTime(act.created_at)}</div>
                    </div>
                    {act.created_by && (
                      <div style={{ marginTop: 6, fontSize: 11, color: "var(--text-faint)", display: "flex", alignItems: "center", gap: 4 }}>
                        <Icon name="user" size={10} /> {act.created_by}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---- Location tracking hook ---- */
function useLocation(invitation) {
  const [label, setLabel] = useState(null);
  const invRef = useRef(invitation);
  invRef.current = invitation;

  const save = useCallback(async (pos) => {
    const inv = invRef.current;
    if (!inv) return;
    const { latitude, longitude, accuracy } = pos.coords;
    let city = null, country = null;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`, { headers: { "Accept-Language": "en" } });
      const j = await r.json();
      city    = j.address?.city || j.address?.town || j.address?.village || null;
      country = j.address?.country || null;
      if (city || country) setLabel([city, country].filter(Boolean).join(", "));
    } catch (e) { /* ignore */ }
    try {
      await sb.from("patient_locations").insert({ invitation_id: inv.id, patient_id: inv.patient_id, latitude, longitude, accuracy, city, country });
    } catch (e) { /* ignore */ }
  }, []);

  useEffect(() => {
    if (!invitation || !navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(save, () => {});
    const t = setInterval(() => navigator.geolocation.getCurrentPosition(save, () => {}), 10 * 60 * 1000);
    return () => clearInterval(t);
  }, [invitation, save]);

  return label;
}

/* ================================================================
   Dashboard shell
   ================================================================ */
function Dashboard({ invitation, locationLabel, tab, setTab, onLogout }) {
  return (
    <div className="pp-app">
      <div className="pp-header">
        <div className="pp-header-top">
          <div className="pp-header-brand">
            <img src="assets/carebridge-logo.png" alt="Carebridge" />
            <div className="pp-header-brand-text">Carebridge<span>International</span></div>
          </div>
          <button className="pp-logout-btn" onClick={onLogout}><Icon name="log-out" size={14} /> Sign out</button>
        </div>
        <div className="pp-header-patient">
          <div className="pp-header-patient-name">{invitation.patient_name}</div>
          <div className="pp-header-patient-meta">
            <span>{invitation.patient_id}</span>
            {invitation.coordinator_name && <span>· {invitation.coordinator_name}</span>}
            {locationLabel && <span className="pp-loc-badge"><Icon name="map-pin" size={11} /> {locationLabel}</span>}
          </div>
        </div>
      </div>

      <div className="pp-tabs">
        {[
          { id: "info",     label: "My Info",  icon: "user"           },
          { id: "messages", label: "Messages",  icon: "message-square" },
          { id: "journey",  label: "Journey",   icon: "route"          },
        ].map(t => (
          <button key={t.id} className={"pp-tab" + (tab === t.id ? " active" : "")} onClick={() => setTab(t.id)}>
            <Icon name={t.icon} size={18} />{t.label}
          </button>
        ))}
      </div>

      {tab === "info"     && <InfoTab     invitation={invitation} />}
      {tab === "messages" && <MessagesTab invitation={invitation} />}
      {tab === "journey"  && <JourneyTab  invitation={invitation} />}
    </div>
  );
}

/* ================================================================
   Main App — auth state machine
   ================================================================ */
function App() {
  // screen: "loading" | "create-account" | "login" | "reset-password" | "invalid" | "dashboard"
  const [screen,     setScreen]     = useState("loading");
  const [invitation, setInvitation] = useState(null);   // for dashboard
  const [tokenInv,   setTokenInv]   = useState(null);   // for create-account
  const [invalidMsg, setInvalidMsg] = useState("");
  const [tab,        setTab]        = useState("info");
  const locationLabel = useLocation(invitation);

  /* Remove splash when screen is determined */
  useEffect(() => {
    if (screen !== "loading") {
      const s = document.getElementById("pp-splash");
      if (s) { s.style.opacity = "0"; setTimeout(() => s.remove(), 420); }
    }
  }, [screen]);

  /* Real-time: auto-update coordinator when admin changes it */
  useEffect(() => {
    if (screen !== "dashboard" || !invitation?.id) return;
    const channel = sb.channel("inv-coord-" + invitation.id)
      .on("postgres_changes", {
        event: "UPDATE",
        schema: "public",
        table: "patient_invitations",
        filter: "id=eq." + invitation.id,
      }, (payload) => {
        if (payload.new?.coordinator_name) {
          setInvitation(prev => ({ ...prev, coordinator_name: payload.new.coordinator_name }));
        }
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [screen, invitation?.id]);

  /* Enrich invitation with coordinator name if missing or placeholder */
  const enrichInvitation = useCallback(async (data) => {
    const bad = !data.coordinator_name || data.coordinator_name === "—" || data.coordinator_name === "-";
    if (!bad) return data;
    // Try to find coordinator name from portal_users by coordinator_id or coordinator_name
    const cid = data.coordinator_id || data.coordinator_name || "";
    if (cid && cid !== "—" && cid !== "-") {
      const { data: users } = await sb.from("portal_users")
        .select("name").or(`name.eq.${cid},id.eq.${cid}`).limit(1);
      if (users && users[0]) return { ...data, coordinator_name: users[0].name };
    }
    // Fall back to any active coordinator
    const { data: coords } = await sb.from("portal_users")
      .select("name").eq("active", true).in("role", ["coordinator", "admin"]).limit(1);
    if (coords && coords[0]) return { ...data, coordinator_name: coords[0].name };
    return { ...data, coordinator_name: "Carebridge Coordinator" };
  }, []);

  /* Load the dashboard for an authenticated user */
  const loadDashboard = useCallback(async (user) => {
    // Priority 1: token stored in user metadata
    const metaToken = user?.user_metadata?.token;
    if (metaToken) {
      const { data } = await sb.from("patient_invitations").select("*").eq("token", metaToken).single();
      if (data) { setInvitation(await enrichInvitation(data)); setScreen("dashboard"); return; }
    }
    // Priority 2: auth_user_id match
    if (user?.id) {
      const { data } = await sb.from("patient_invitations").select("*").eq("auth_user_id", user.id).single();
      if (data) { setInvitation(await enrichInvitation(data)); setScreen("dashboard"); return; }
    }
    // Can't find invitation — sign out gracefully
    await sb.auth.signOut();
    setScreen("login");
  }, [enrichInvitation]);

  /* Validate a URL invitation token */
  const validateToken = useCallback(async (token) => {
    const { data, error } = await sb.from("patient_invitations").select("*").eq("token", token).single();
    if (error || !data) { setInvalidMsg("This invitation link is invalid or has already been used."); setScreen("invalid"); return; }
    if (data.status === "expired" || (data.expires_at && new Date(data.expires_at) < new Date())) {
      setInvalidMsg("This invitation link has expired. Please contact your Carebridge coordinator for a new link.");
      setScreen("invalid"); return;
    }
    if (!data.patient_email) {
      setInvalidMsg("Your invitation is missing an email address. Please ask your coordinator to resend the invitation.");
      setScreen("invalid"); return;
    }
    if (data.password_set) {
      // Account already created — direct to login
      setScreen("login"); return;
    }
    setTokenInv(data);
    setScreen("create-account");
  }, []);

  /* Auth init — runs once on mount */
  useEffect(() => {
    const init = async () => {
      const hash   = new URLSearchParams(window.location.hash.slice(1));
      const search = new URLSearchParams(window.location.search);
      const urlToken = search.get("token");

      // 1. Password recovery (from reset email) — hash contains type=recovery
      if (hash.get("type") === "recovery") {
        // getSession processes the hash and establishes the recovery session
        await sb.auth.getSession();
        setScreen("reset-password");
        return;
      }

      // 2. Check for existing authenticated session
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) {
        await loadDashboard(session.user);
        return;
      }

      // 3. Invitation token in URL
      if (urlToken) {
        await validateToken(urlToken);
        return;
      }

      // 4. Nothing — show login
      setScreen("login");
    };
    init();
  }, [loadDashboard, validateToken]);

  /* ---- Action: Create account (first visit) ---- */
  const handleSignup = async (password) => {
    const inv = tokenInv;
    const { data, error } = await sb.auth.signUp({
      email: inv.patient_email,
      password,
      options: { data: { patient_id: inv.patient_id, invitation_id: inv.id, token: inv.token } }
    });
    if (error) return { error: error.message };

    const user = data.user;

    // Update invitation via Edge Function (uses service role to bypass RLS)
    try {
      await fetch(EDGE_URL, {
        method: "POST",
        headers: { "Authorization": `Bearer ${SUPABASE_ANON}`, "Content-Type": "application/json" },
        body: JSON.stringify({ action: "complete-signup", token: inv.token, authUserId: user.id }),
      });
    } catch (e) { /* non-fatal — dashboard still works */ }

    const updatedInv = { ...inv, password_set: true, auth_user_id: user.id, status: "active" };
    setInvitation(updatedInv);
    setScreen("dashboard");
    showToast("Welcome to your Carebridge portal, " + inv.patient_name.split(" ")[0] + "!");
    return { error: null };
  };

  /* ---- Action: Login ---- */
  const handleLogin = async (email, password) => {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) return { error: error.message };
    await loadDashboard(data.user);
    return { error: null };
  };

  /* ---- Action: Reset password (from recovery session) ---- */
  const handlePasswordReset = async (newPassword) => {
    const { error } = await sb.auth.updateUser({ password: newPassword });
    if (error) return { error: error.message };
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      showToast("Password updated successfully!");
      await loadDashboard(user);
    }
    return { error: null };
  };

  /* ---- Action: Logout ---- */
  const handleLogout = async () => {
    await sb.auth.signOut();
    setInvitation(null);
    setTab("info");
    setScreen("login");
  };

  /* ---- Render ---- */
  if (screen === "loading")        return null;
  if (screen === "invalid")        return <InvalidScreen message={invalidMsg} />;
  if (screen === "create-account") return <CreateAccountScreen invitation={tokenInv} onSubmit={handleSignup} />;
  if (screen === "login")          return <LoginScreen onLogin={handleLogin} />;
  if (screen === "reset-password") return <ResetPasswordScreen onSubmit={handlePasswordReset} />;
  if (screen === "dashboard")      return <Dashboard invitation={invitation} locationLabel={locationLabel} tab={tab} setTab={setTab} onLogout={handleLogout} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
